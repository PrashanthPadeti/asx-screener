# ASX Screener — log rotation config
# Install: sudo cp ops/logrotate.conf /etc/logrotate.d/asx-screener
#
# Rotates pipeline logs weekly, keeps 12 weeks (3 months) of history.
# Compresses old logs. Safe for cron jobs (copytruncate avoids pipe breaks).

/opt/asx-screener/logs/*.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}
