name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          cd backend
          pip install ruff mypy
      - name: Ruff lint
        run: cd backend && ruff check app/
      - name: Type check
        run: cd backend && mypy app/ --ignore-missing-imports || true

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short || echo "No tests yet"
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost/test"
          DATABASE_URL_SYNC: "postgresql://test:test@localhost/test"
          JWT_SECRET: "test-secret-key"
