# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for asxscreener.com.au
# SSL is terminated upstream (Cloudflare / load balancer) — this server
# only listens on HTTP port 80.
#
# Deploy to: /etc/nginx/sites-available/asxscreener
# Enable:    ln -s /etc/nginx/sites-available/asxscreener /etc/nginx/sites-enabled/
# Test:      nginx -t
# Reload:    systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream definitions ──────────────────────────────────────────────────────
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream fastapi {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

# ── Main server (HTTP — SSL handled upstream) ─────────────────────────────────
server {
    listen 80;
    server_name asxscreener.com.au www.asxscreener.com.au _;

    # Security headers (HTTPS enforced by Cloudflare, not here)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Pass real visitor IP from Cloudflare
    real_ip_header    CF-Connecting-IP;

    # ── Next.js static assets (immutable, 1 year) ────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Next.js image optimisation ───────────────────────────────────────────
    location /_next/image {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    }

    # ── FastAPI backend (/api/*) ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # No caching at Nginx for API — Redis handles it upstream
        add_header Cache-Control "no-store" always;
    }

    # ── FastAPI docs (dev convenience) ───────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────
    location / {
        limit_req zone=general burst=120 nodelay;

        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    # ── Public static files (favicon, robots.txt, etc.) ──────────────────────
    location ~* \.(ico|txt|xml|webmanifest)$ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Buffer tuning
    proxy_buffering          on;
    proxy_buffer_size        8k;
    proxy_buffers            16 8k;
    proxy_busy_buffers_size  16k;

    client_max_body_size 2m;
}
